unbindall

snd_mute_losefocus 0

ui_steam_overlay_notification_position "bottomright"

// HUD Color
cl_hud_color 0

cl_use_opens_buy_menu "1"

cl_sniper_show_inaccuracy 0

// viewmodel
viewmodel_presetpos "1"
viewmodel_fov "68"
viewmodel_offset_x "2.5"
viewmodel_offset_y "-1.5"
viewmodel_offset_z "-2"

// mouse
bind "MOUSE_X" "yaw"
bind "MOUSE_Y" "pitch"

// function keys
bind   "F3" "voice_modenable_toggle"
unbind "F4"
unbind "F5"
unbind "F6"
unbind "F7"
unbind "F8"
unbind "F9"
unbind "F10"
unbind "F11"
unbind "F12"

// KEYBOARD / MOUSE > KEYBOARD & MOUSE SETTINGS
sensitivity            "1.25"  // Mouse Sensitivity
zoom_sensitivity_ratio "1.00"  // Zoom Sensitivity Multiplier

// KEYBOARD / MOUSE > MOVEMENT KEYS
bind "w"     "+forward"
bind "a"     "+left"
bind "s"     "+back"
bind "d"     "+right"
bind "ALT"   "+sprint"
bind "SHIFT" "+duck"
bind "SPACE" "+jump"

// KEYBOARD / MOUSE > WEAPON KEYS
bind "e"      "+use"          // Use
bind "MOUSE1" "+attack"       // Fire
bind "MOUSE2" "+attack2"      // Secondary Fire
bind "r"      "+reload"       // Reload
bind "q"      "lastinv"       // Last Weapon Used
bind "g"      "drop"          // Drop Weapon
bind "f"      "+lookatweapon" // Inspect Weapon
bind "b"      "buymenu"       // Buy Menu
bind "1"      "slot1"         // Primary Weapon
bind "2"      "slot2"         // Secondary Weapon
bind "3"      "slot3"         // Melee Weapons
bind "4"      "slot5"         // Explosives & Traps
bind "v"      "slot6"         // HE Grenade
bind "c"      "slot7"         // Flashbang
bind "x"      "slot8"         // Smoke Grenade
bind "z"      "slot10"        // Molotov Cocktail / Incendiary Grenade

// KEYBOARD / MOUSE > UI Keys
bind "TAB" "+showscores"
bind "`"   "toggleconsole"

// KEYBOARD / MOUSE > COMMUNICATION OPTIONS
bind "MOUSE3" "player_ping"
bind "y"      "messagemode2"
bind "t"      "messagemode"
bind "MOUSE5" "+voicerecord"

